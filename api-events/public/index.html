<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Events — Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }

        header {
            background: #1e1e2e;
            color: white;
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1.2rem;
            font-weight: 600;
        }

        header span { font-size: 1.5rem; }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            color: #1e1e2e;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 0.3rem;
            margin-top: 0.8rem;
        }

        input, textarea {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: border 0.2s;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #6c63ff;
        }

        textarea { resize: vertical; min-height: 70px; }

        button {
            width: 100%;
            margin-top: 1.2rem;
            padding: 0.75rem;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #574fd6; }

        .toast {
            display: none;
            margin-top: 1rem;
            padding: 0.7rem 1rem;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 500;
        }

        .toast.success { background: #e6f9f0; color: #1a7a4a; display: block; }
        .toast.error   { background: #fdecea; color: #c0392b; display: block; }

        /* Liste des événements */
        .card.full { grid-column: 1 / -1; }

        #eventsList { display: flex; flex-direction: column; gap: 0.8rem; }

        .event-item {
            background: #f8f9ff;
            border: 1.5px solid #e8e8ff;
            border-radius: 8px;
            padding: 0.9rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .event-item .info { flex: 1; }

        .event-item .title {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .event-item .meta {
            font-size: 0.8rem;
            color: #888;
            margin-top: 0.2rem;
        }

        .badge {
            background: #6c63ff;
            color: white;
            font-size: 0.75rem;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            white-space: nowrap;
        }

        .delete-btn {
            background: none;
            border: 1.5px solid #e74c3c;
            color: #e74c3c;
            width: auto;
            margin-top: 0;
            padding: 0.3rem 0.7rem;
            font-size: 0.8rem;
            border-radius: 6px;
            margin-left: 0.8rem;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .delete-btn:hover { background: #e74c3c; color: white; }

        .empty {
            text-align: center;
            color: #aaa;
            font-size: 0.9rem;
            padding: 2rem 0;
        }

        .refresh-btn {
            background: none;
            border: 1.5px solid #6c63ff;
            color: #6c63ff;
            width: auto;
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
            margin-top: 0;
            margin-bottom: 1rem;
        }

        .refresh-btn:hover { background: #f0eeff; }

        .count {
            font-size: 0.8rem;
            color: #888;
            margin-left: auto;
        }
    </style>
</head>
<body>

<header>
    <span>🗓️</span> API Events — Dashboard
</header>

<div class="container">

    <!-- FORMULAIRE -->
    <div class="card">
        <h2>➕ Ajouter un événement</h2>

        <label for="title">Titre *</label>
        <input type="text" id="title" placeholder="Ex: Conférence CI/CD" />

        <label for="date">Date *</label>
        <input type="date" id="date" />

        <label for="description">Description</label>
        <textarea id="description" placeholder="Détails de l'événement..."></textarea>

        <button onclick="submitEvent()">Créer l'événement</button>

        <div id="toast" class="toast"></div>
    </div>

    <!-- STATS -->
    <div class="card">
        <h2>📊 Statistiques</h2>
        <div style="display:flex; flex-direction:column; gap:1rem; margin-top:0.5rem">
            <div style="background:#f8f9ff;border-radius:8px;padding:1rem;text-align:center">
                <div style="font-size:2rem;font-weight:700;color:#6c63ff" id="statTotal">—</div>
                <div style="font-size:0.85rem;color:#888;margin-top:0.2rem">événements total</div>
            </div>
            <div style="background:#f8f9ff;border-radius:8px;padding:1rem;text-align:center">
                <div style="font-size:2rem;font-weight:700;color:#27ae60" id="statNext">—</div>
                <div style="font-size:0.85rem;color:#888;margin-top:0.2rem">prochain événement</div>
            </div>
        </div>
    </div>

    <!-- LISTE -->
    <div class="card full">
        <h2>
            📋 Liste des événements
            <span class="count" id="countLabel"></span>
        </h2>
        <button class="refresh-btn" onclick="loadEvents()">🔄 Rafraîchir</button>
        <div id="eventsList"><p class="empty">Chargement...</p></div>
    </div>

</div>

<script>
    const API = 'http://localhost:3000';

    // ── Charger et afficher les événements ──────────────────────────
    async function loadEvents() {
        try {
            const res = await fetch(`${API}/events`);
            const events = await res.json();

            updateStats(events);

            const list = document.getElementById('eventsList');
            if (events.length === 0) {
                list.innerHTML = '<p class="empty">Aucun événement pour l\'instant.</p>';
                return;
            }

            document.getElementById('countLabel').textContent = `(${events.length})`;

            list.innerHTML = events.map(e => `
                <div class="event-item">
                    <div class="info">
                        <div class="title">${e.title}</div>
                        <div class="meta">${e.description || '<em>Pas de description</em>'}</div>
                    </div>
                    <span class="badge">📅 ${formatDate(e.date)}</span>
                    <button class="delete-btn" onclick="deleteEvent(${e.id})">🗑️ Supprimer</button>
                </div>
            `).join('');

        } catch (err) {
            document.getElementById('eventsList').innerHTML =
                '<p class="empty">❌ Impossible de contacter l\'API.</p>';
        }
    }

    // ── Soumettre le formulaire ─────────────────────────────────────
    async function submitEvent() {
        const title       = document.getElementById('title').value.trim();
        const date        = document.getElementById('date').value;
        const description = document.getElementById('description').value.trim();
        const toast       = document.getElementById('toast');

        toast.className = 'toast';
        toast.textContent = '';

        try {
            const res = await fetch(`${API}/events`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, date, description })
            });

            const data = await res.json();

            if (!res.ok) {
                toast.className = 'toast error';
                toast.textContent = '❌ ' + data.error;
                return;
            }

            toast.className = 'toast success';
            toast.textContent = `✅ Événement "${data.title}" créé avec l'id #${data.id}`;

            // Reset du formulaire
            document.getElementById('title').value = '';
            document.getElementById('date').value = '';
            document.getElementById('description').value = '';

            loadEvents();

        } catch (err) {
            toast.className = 'toast error';
            toast.textContent = '❌ Impossible de contacter l\'API.';
        }
    }

    // ── Supprimer un événement ──────────────────────────────────────
    async function deleteEvent(id) {
        if (!confirm(`Supprimer l'événement #${id} ?`)) return;

        const res = await fetch(`${API}/events/${id}`, { method: 'DELETE' });
        const data = await res.json();

        if (res.ok) loadEvents();
        else alert('❌ ' + data.error);
    }

    // ── Stats ───────────────────────────────────────────────────────
    function updateStats(events) {
        document.getElementById('statTotal').textContent = events.length;

        const today = new Date(); today.setHours(0,0,0,0);
        const future = events
            .filter(e => new Date(e.date) >= today)
            .sort((a, b) => new Date(a.date) - new Date(b.date));

        document.getElementById('statNext').textContent =
            future.length > 0 ? formatDate(future[0].date) : 'Aucun';
    }

    // ── Formatage de date ───────────────────────────────────────────
    function formatDate(dateStr) {
        return new Date(dateStr).toLocaleDateString('fr-FR', {
            day: '2-digit', month: 'short', year: 'numeric'
        });
    }

    // Chargement initial
    loadEvents();
</script>

</body>
</html>
